# Z-Score Thresholds for WeightLens Feature Filtering
# Higher thresholds retain only the most statistically prominent tokens

model_thresholds:
  "gpt2":
    input_projection: 4.0       # Encoder vector -> Embedding matrix projection
    output_projection: 4.0      # Decoder vector -> Unembedding matrix projection
    connected_features: 3.0     # Cross-layer feature connection identification
    description: "GPT-2 family: smaller vocabulary, lower threshold sufficient"

  "gpt2-medium":
    input_projection: 4.0
    output_projection: 4.0
    connected_features: 3.0

  "gpt2-large":
    input_projection: 4.0
    output_projection: 4.0
    connected_features: 3.0

  "gpt2-xl":
    input_projection: 4.0
    output_projection: 4.0
    connected_features: 3.0

  "pythia":
    input_projection: 4.0
    output_projection: 4.0
    connected_features: 3.0
    description: "Pythia family: similar vocabulary size to GPT-2"

  "gemma-2-2b":
    input_projection: 4.5       # Large vocabulary requires stricter filtering
    output_projection: 4.5
    connected_features: 3.0
    description: "Gemma-2-2B: large vocabulary, higher threshold required"

  "llama-3.2-1b":
    input_projection: 4.5
    output_projection: 4.5
    connected_features: 3.0
    description: "Llama-3.2-1B: large vocabulary, higher threshold required"

  "llama-3-8b":
    input_projection: 4.5
    output_projection: 4.5
    connected_features: 3.0

  "qwen2":
    input_projection: 4.5
    output_projection: 4.5
    connected_features: 3.0

# Default fallback thresholds
defaults:
  input_projection: 4.0
  output_projection: 4.0
  connected_features: 3.0
  top_k_tokens: 20              # Maximum number of top tokens to retain after filtering
