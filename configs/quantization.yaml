# Mixed Precision Quantization Configuration
# Optimized for NVIDIA Ada Lovelace 4th-gen Tensor Cores

# VRAM allocation matrix by model scale
model_configs:
  "1.5B":
    precision: "fp16"
    vram_model_gb: 5.0
    vram_available_gb: 19.0
    paging_required: false
    description: "1.5B models (e.g. DeepSeek-Distill-1.5B) - millisecond response"

  "2B-3B":
    precision: "fp16"
    vram_model_gb: 9.0
    vram_available_gb: 15.0
    paging_required: false
    description: "2B-3B models (e.g. Gemma-2-2B) - excellent performance"

  "7B-8B":
    precision: "int8"           # fallback; use fp8 if hardware supports it
    vram_model_gb: 12.0
    vram_available_gb: 12.0
    paging_required: false
    description: "7B-8B models (e.g. Llama-3-8B) - seconds to tens of seconds"

  "9B":
    precision: "int8"
    vram_model_gb: 17.0
    vram_available_gb: 7.0
    paging_required: true
    paging_chunk_layers: 4      # Load transcoder in chunks of 4 layers
    description: "9B models (e.g. Gemma-9B) - edge case, performance degraded"

# Supported target models
supported_models:
  - "gpt2"
  - "gpt2-medium"
  - "gpt2-large"
  - "gpt2-xl"
  - "EleutherAI/pythia-70m"
  - "EleutherAI/pythia-160m"
  - "EleutherAI/pythia-410m"
  - "EleutherAI/pythia-1b"
  - "Qwen/Qwen2-1.5B"
  - "Qwen/Qwen2-7B"
  - "google/gemma-2-2b"
  - "google/gemma-2-9b"
  - "meta-llama/Llama-3.2-1B"
  - "meta-llama/Meta-Llama-3-8B"
